# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Deploy to production"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write # required for OIDC token issuance
  contents: read

env:
  AWS_REGION: ap-southeast-4
  ECR_REPOSITORY: qd-auth
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  # ============================================================
  # Job 1 — Build and test
  # Runs on every push to every branch
  # ============================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        run: ./mvnw verify
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Build Docker image
        run: docker build -t ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

  # ============================================================
  # Job 2 — Push to ECR and deploy to staging
  # Runs only on push to main
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: qd-auth-staging
          container-name: qd-auth-staging
          image: ${{ steps.login-ecr.outputs.registry }}/qd-auth:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS staging
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: qd-auth-staging
          cluster: qd-auth-staging
          wait-for-service-stability: true

  # ============================================================
  # Job 3 — Deploy to production
  # Triggered manually via workflow_dispatch only
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_production == true
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to ECS production
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          aws ecs update-service \
            --cluster qd-auth-production \
            --service qd-auth-production \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
