# src/main/resources/application.yml
spring:
  application:
    name: qd-auth

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/qdauth}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080
